name: Refresh St. Vrain Knowledge Pack

on:
  workflow_dispatch:
  schedule:
    - cron: "15 08 * * *"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Build knowledge pack
        run: python scripts/build_st_vrain_pack.py --output knowledge/st_vrain_knowledge_pack.md

      - name: Commit updated pack
        run: |
          if git diff --quiet --exit-code -- knowledge/st_vrain_knowledge_pack.md; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add knowledge/st_vrain_knowledge_pack.md
          git commit -m "Refresh St. Vrain knowledge pack"
          git push
